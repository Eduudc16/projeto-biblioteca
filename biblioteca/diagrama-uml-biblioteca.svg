<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="diamond" viewBox="0 0 14 10" refX="13" refY="5" markerWidth="10" markerHeight="8" orient="auto">
      <path d="M1 5L7 1L13 5L7 9Z" fill="none" stroke="#888780" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ========== MAIN ========== -->
  <rect x="260" y="30" width="160" height="100" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <rect x="260" y="30" width="160" height="28" rx="4" fill="#B4B2A9" stroke="none"/>
  <rect x="260" y="50" width="160" height="8"  fill="#B4B2A9" stroke="none"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="340" y="50" text-anchor="middle" dominant-baseline="central">Main</text>
  <line x1="260" y1="58" x2="420" y2="58" stroke="#888780" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#444441" x="272" y="74" dominant-baseline="central">- scanner : Scanner</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#444441" x="272" y="90" dominant-baseline="central">- biblioteca : Biblioteca</text>
  <line x1="260" y1="101" x2="420" y2="101" stroke="#888780" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#444441" x="272" y="117" dominant-baseline="central">+ main() : void</text>

  <!-- ========== BIBLIOTECA ========== -->
  <rect x="200" y="220" width="280" height="196" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="200" y="220" width="280" height="28"  rx="4" fill="#AFA9EC" stroke="none"/>
  <rect x="200" y="240" width="280" height="8"   fill="#AFA9EC" stroke="none"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C" x="340" y="240" text-anchor="middle" dominant-baseline="central">Biblioteca</text>
  <line x1="200" y1="248" x2="480" y2="248" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="212" y="263" dominant-baseline="central">- livros : List&lt;Livro&gt;</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="212" y="279" dominant-baseline="central">- usuarios : List&lt;Usuario&gt;</text>
  <line x1="200" y1="291" x2="480" y2="291" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="212" y="307" dominant-baseline="central">+ cadastrarLivro() : Livro</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="212" y="323" dominant-baseline="central">+ removerLivro() : boolean</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="212" y="339" dominant-baseline="central">+ cadastrarUsuario() : Usuario</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="212" y="355" dominant-baseline="central">+ removerUsuario() : boolean</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="212" y="371" dominant-baseline="central">+ alugarLivro() : String</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#3C3489" x="212" y="387" dominant-baseline="central">+ devolverLivro() : String</text>

  <!-- ========== LIVRO ========== -->
  <rect x="40" y="490" width="240" height="106" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="40" y="490" width="240" height="28"  rx="4" fill="#5DCAA5" stroke="none"/>
  <rect x="40" y="510" width="240" height="8"   fill="#5DCAA5" stroke="none"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C" x="160" y="510" text-anchor="middle" dominant-baseline="central">Livro</text>
  <line x1="40" y1="518" x2="280" y2="518" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="52" y="534" dominant-baseline="central">- id : int</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="52" y="550" dominant-baseline="central">- titulo : String</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="52" y="566" dominant-baseline="central">- alugado : boolean</text>
  <line x1="40" y1="577" x2="280" y2="577" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#085041" x="52" y="593" dominant-baseline="central">+ paraLinha() / daLinha()</text>

  <!-- ========== USUARIO ========== -->
  <rect x="400" y="490" width="240" height="106" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <rect x="400" y="490" width="240" height="28"  rx="4" fill="#F0997B" stroke="none"/>
  <rect x="400" y="510" width="240" height="8"   fill="#F0997B" stroke="none"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C" x="520" y="510" text-anchor="middle" dominant-baseline="central">Usuario</text>
  <line x1="400" y1="518" x2="640" y2="518" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#712B13" x="412" y="534" dominant-baseline="central">- id : int</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#712B13" x="412" y="550" dominant-baseline="central">- nome : String</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#712B13" x="412" y="566" dominant-baseline="central">- telefone : String</text>
  <line x1="400" y1="577" x2="640" y2="577" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#712B13" x="412" y="593" dominant-baseline="central">+ paraLinha() / daLinha()</text>

  <!-- ========== SETAS ========== -->
  <!-- Main -> Biblioteca (usa, tracejada) -->
  <line x1="340" y1="130" x2="340" y2="218" stroke="#888780" stroke-width="1" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <rect x="348" y="164" width="26" height="16" fill="#ffffff"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="361" y="175" text-anchor="middle">usa</text>

  <!-- Biblioteca -> Livro (agregação) -->
  <line x1="250" y1="416" x2="160" y2="488" stroke="#888780" stroke-width="1" marker-end="url(#diamond)"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="186" y="446">1..*</text>

  <!-- Biblioteca -> Usuario (agregação) -->
  <line x1="430" y1="416" x2="520" y2="488" stroke="#888780" stroke-width="1" marker-end="url(#diamond)"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="468" y="446">1..*</text>

  <!-- ========== LEGENDA ========== -->
  <text font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#444441" x="40" y="26">Legenda:</text>
  <line x1="100" y1="22" x2="140" y2="22" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="146" y="26">usa (dependência)</text>
  <line x1="100" y1="42" x2="140" y2="42" stroke="#888780" stroke-width="1" marker-end="url(#diamond)"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="146" y="46">tem (agregação)</text>
</svg>
